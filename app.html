<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>STRATOS AI · Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#05070a;color:#e8feff;font-family:'Inter',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
:root{
  --blue:#00E5FF;--green:#39FF7A;--orange:#FF9D2E;--purple:#a78bfa;--red:#ff5c7a;
  --bg2:rgba(255,255,255,.03);--border:rgba(255,255,255,.07);
  --text-muted:#6fa9b2;--text-dim:#4f7780;--radius:12px;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.13;
  background-image:linear-gradient(rgba(0,229,255,.06) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,229,255,.06) 1px,transparent 1px);background-size:46px 46px;}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:18px 14px 40px;}
.dash-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;animation:fadeUp .4s ease-out;}
.avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#00E5FF,#0062ff);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#000;flex-shrink:0;box-shadow:0 0 16px rgba(0,229,255,.35);}
.dash-hi{flex:1;min-width:0;}
.dash-hi-name{font-size:17px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dash-hi-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
.dash-logo{font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--blue);flex-shrink:0;}
.points-hero{background:linear-gradient(135deg,rgba(57,255,122,.08),rgba(0,229,255,.04));border:1px solid rgba(57,255,122,.22);border-radius:18px;padding:22px 18px;text-align:center;margin-bottom:14px;animation:fadeUp .45s ease-out;}
.points-val{font-size:2.8rem;font-weight:900;color:var(--green);line-height:1;text-shadow:0 0 26px rgba(57,255,122,.5);}
.points-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-top:6px;}
.points-meta{display:flex;justify-content:center;gap:20px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06);}
.pm-cell{text-align:center;}
.pm-val{font-size:1.1rem;font-weight:900;}
.pm-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-top:2px;}
.sec{margin-bottom:14px;animation:fadeUp .5s ease-out;}
.sec-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:var(--blue);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.sec-label .hint{margin-left:auto;font-size:10px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--text-dim);}
.streak-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.streak-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.streak-flame{font-size:30px;line-height:1;}
.streak-num{font-size:1.7rem;font-weight:900;color:var(--orange);line-height:1;}
.streak-cap{font-size:11px;color:var(--text-muted);margin-top:2px;}
.streak-dots{display:flex;gap:5px;}
.sd{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.08);}
.sd.on{background:var(--green);box-shadow:0 0 6px rgba(57,255,122,.4);}
.streak-next{font-size:11px;color:var(--text-dim);text-align:center;margin-top:10px;}
.checkin-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:12px;padding:12px;border-radius:10px;font-size:14px;font-weight:800;background:linear-gradient(135deg,#39FF7A,#00c853);color:#000;box-shadow:0 0 16px rgba(57,255,122,.3);}
.task-row{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);margin-bottom:7px;}
.task-row.done{border-color:rgba(57,255,122,.2);background:rgba(57,255,122,.03);}
.task-check{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:900;border:2px solid var(--border);color:var(--text-dim);}
.task-check.done{background:var(--green);border-color:var(--green);color:#000;}
.task-info{flex:1;min-width:0;}
.task-name{font-size:13px;font-weight:700;color:#fff;}
.task-sub{font-size:10px;color:var(--text-dim);margin-top:1px;}
.task-pts{font-size:12px;font-weight:800;color:var(--green);flex-shrink:0;}
.task-pts.pending{color:var(--text-dim);}
.task-go{font-size:11px;font-weight:700;color:var(--blue);padding:5px 11px;border-radius:8px;border:1px solid rgba(0,229,255,.25);background:rgba(0,229,255,.05);flex-shrink:0;}
.ref-box{background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.22);border-radius:var(--radius);padding:16px;}
.ref-stat{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ref-stat-val{font-size:1.5rem;font-weight:900;color:var(--purple);}
.ref-stat-lbl{font-size:11px;color:var(--text-muted);}
.ref-link-row{display:flex;gap:7px;}
.ref-link{flex:1;padding:10px 12px;border-radius:9px;background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text-muted);font-size:11px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ref-copy{padding:10px 16px;border-radius:9px;font-size:12px;font-weight:800;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);color:var(--purple);flex-shrink:0;}
.ref-share{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:8px;padding:11px;border-radius:9px;font-size:13px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#7c5cfc);color:#fff;}
.lb-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.lb-row{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.03);}
.lb-row:last-child{border-bottom:none;}
.lb-row.me{background:rgba(0,229,255,.06);}
.lb-rank{font-size:13px;font-weight:900;width:26px;text-align:center;flex-shrink:0;}
.lb-name{flex:1;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-streak{font-size:10px;color:var(--orange);flex-shrink:0;}
.lb-pts{font-size:12px;font-weight:900;color:var(--green);flex-shrink:0;min-width:54px;text-align:right;}
.medal-1{color:#FFD700;}.medal-2{color:#C0C0C0;}.medal-3{color:#CD7F32;}
.sb-cta{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:800;background:linear-gradient(135deg,#00E5FF,#0062ff);color:#000;box-shadow:0 0 22px rgba(0,229,255,.35);margin-bottom:10px;}
.sb-sub{text-align:center;font-size:11px;color:var(--text-dim);margin-bottom:8px;}
.spinner{width:18px;height:18px;border:2px solid rgba(0,229,255,.15);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
.center-load{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px;}
.err-box{text-align:center;padding:40px 20px;}
.err-box .err-ico{font-size:38px;margin-bottom:12px;}
.err-box .err-ttl{font-size:16px;font-weight:800;color:#fff;margin-bottom:8px;}
.err-box .err-msg{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:18px;}
.err-box .err-btn{display:inline-block;padding:11px 22px;border-radius:10px;font-weight:800;font-size:14px;background:var(--blue);color:#000;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);z-index:100;background:#13161e;border:1px solid rgba(57,255,122,.3);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:700;color:var(--green);box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.16,1,.3,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrap" id="root">
  <div class="center-load"><span class="spinner"></span><div style="margin-top:12px">Loading your dashboard…</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* STRATOS AI — Telegram Mini App Dashboard
   Auth: Telegram initData verified server-side by the bot's /miniapp-data endpoint. */

var BOT_API = 'https://stratosai-bot-production.up.railway.app';
var SPORTSBOOK_URL = 'https://stratosai.bet';
var BOT_USERNAME   = 'StratosAidrop_Bot';

var TG = window.Telegram ? window.Telegram.WebApp : null;
var ME = null;

var TASKS = [
  {field:'task_joined_channel',   name:'Join Telegram Channel', pts:200, url:'https://t.me/stratosAi_official', sub:'@stratosAi_official'},
  {field:'task_followed_twitter', name:'Follow on X',           pts:200, url:'https://x.com/stratosaig',        sub:'@stratosaig'},
  {field:'task_visited_website',  name:'Visit the Website',     pts:100, url:'https://stratosai.net',           sub:'stratosai.net'},
  {field:'task_visit_sportsbook', name:'Visit Sportsbook',      pts:250, url:null, sub:'Open from the bot — automatic'},
  {field:'task_connect_wallet',   name:'Connect Wallet',        pts:300, url:null, sub:'On the sportsbook — automatic'},
  {field:'task_place_bet',        name:'Place a Bet',           pts:400, url:null, sub:'Build a slip — automatic'},
  {field:'task_winning_bet',      name:'Win a Bet',             pts:500, url:null, sub:'Land a winning slip — automatic'},
];

function esc(s){return String(s==null?'':s).replace(/[<>&"]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}
function fmt(n){return (n||0).toLocaleString();}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

async function init(){
  if(!TG || !TG.initData){
    return showError('Open in Telegram','This dashboard works inside the STRATOS AI Telegram bot. Open it from there to see your points and stats.','Open the Bot','https://t.me/'+BOT_USERNAME);
  }
  TG.ready(); TG.expand();
  try{
    var res = await fetch(BOT_API + '/miniapp-data', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ initData: TG.initData })
    });
    if(res.status===401) throw new Error('verify');
    if(!res.ok) throw new Error('http '+res.status);
    ME = await res.json();
    render();
  }catch(e){
    if(String(e.message)==='verify'){
      showError('Could not verify','We could not verify your Telegram session. Please re-open the dashboard from the bot.','Open the Bot','https://t.me/'+BOT_USERNAME);
    }else{
      showError('Something went wrong','Could not load your dashboard right now. Please try again in a moment.','Retry',null);
    }
  }
}

function showError(title,msg,btnText,btnUrl){
  var btn = btnUrl ? '<a class="err-btn" href="'+btnUrl+'">'+esc(btnText)+'</a>' : '<button class="err-btn" onclick="location.reload()">'+esc(btnText)+'</button>';
  document.getElementById('root').innerHTML = '<div class="err-box"><div class="err-ico">📊</div><div class="err-ttl">'+esc(title)+'</div><div class="err-msg">'+esc(msg)+'</div>'+btn+'</div>';
}

function render(){
  var u = ME.user;
  var lb = ME.leaderboard || [];
  var refCount = ME.referralCount || 0;
  var rank = ME.rank || '—';

  var doneCount=0, pendingPts=0;
  TASKS.forEach(function(t){ if(u[t.field]){doneCount++;}else{pendingPts+=t.pts;} });
  var refPts = refCount * 300;
  var projected = (u.points||0) + pendingPts;

  var initial = (u.first_name||'?').trim().charAt(0).toUpperCase() || '?';
  var streak = u.streak_count||0;
  var nextWeekly = streak % 7 === 0 ? (streak>0?0:7) : 7-(streak%7);
  var pos = streak%7===0 && streak>0 ? 7 : streak%7;
  var dots=''; for(var i=1;i<=7;i++){dots+='<div class="sd'+(i<=pos?' on':'')+'"></div>';}

  var refLink = 'https://t.me/'+BOT_USERNAME+'?start='+(u.referral_code||'');
  var html='';

  html+='<div class="dash-head"><div class="avatar">'+esc(initial)+'</div>'+
    '<div class="dash-hi"><div class="dash-hi-name">'+esc(u.first_name||'Friend')+'</div>'+
    '<div class="dash-hi-sub">'+(u.username?'@'+esc(u.username):'STRATOS AI member')+'</div></div>'+
    '<div class="dash-logo">STRATOS<span style="color:#fff">AI</span></div></div>';

  html+='<div class="points-hero"><div class="points-val">'+fmt(u.points)+'</div><div class="points-lbl">$STRAT Points</div>'+
    '<div class="points-meta">'+
      '<div class="pm-cell"><div class="pm-val" style="color:var(--blue)">'+esc(String(rank))+'</div><div class="pm-lbl">Rank</div></div>'+
      '<div class="pm-cell"><div class="pm-val" style="color:var(--orange)">'+doneCount+'/7</div><div class="pm-lbl">Tasks</div></div>'+
      '<div class="pm-cell"><div class="pm-val" style="color:var(--purple)">'+refCount+'</div><div class="pm-lbl">Referrals</div></div>'+
    '</div></div>';

  if(pendingPts>0){
    html+='<div class="sec"><div style="background:rgba(255,157,46,.05);border:1px solid rgba(255,157,46,.2);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:10px">'+
      '<div style="font-size:22px">💰</div><div style="flex:1"><div style="font-size:12px;color:var(--text-muted)">Potential balance</div>'+
      '<div style="font-size:1.2rem;font-weight:900;color:var(--orange)">'+fmt(projected)+' <span style="font-size:11px;color:var(--text-dim)">$STRAT</span></div></div>'+
      '<div style="font-size:11px;color:var(--text-dim);text-align:right">+'+fmt(pendingPts)+'<br>to claim</div></div></div>';
  }

  html+='<div class="sec"><div class="sec-label">🔥 Daily Streak</div><div class="streak-box">'+
      '<div class="streak-top"><div class="streak-flame">🔥</div><div style="flex:1"><div class="streak-num">'+streak+' day'+(streak===1?'':'s')+'</div>'+
      '<div class="streak-cap">Longest: '+(u.longest_streak||streak)+' days'+(u.shield_active?' · 🛡 Shield active':'')+'</div></div></div>'+
      '<div class="streak-dots">'+dots+'</div>'+
      '<div class="streak-next">'+(nextWeekly===0?'🎉 Weekly bonus ready!':nextWeekly+' more day'+(nextWeekly===1?'':'s')+' to the +2000 weekly bonus')+'</div>'+
      '<a class="checkin-btn" href="'+SPORTSBOOK_URL+'?tgid='+u.telegram_id+'" onclick="openLink(event,\''+SPORTSBOOK_URL+'?tgid='+u.telegram_id+'\')">✅ Check In Now</a>'+
    '</div></div>';

  html+='<div class="sec"><div class="sec-label">✅ Tasks <span class="hint">'+doneCount+'/7 done</span></div>';
  TASKS.forEach(function(t){
    var done=!!u[t.field];
    html+='<div class="task-row'+(done?' done':'')+'"><div class="task-check'+(done?' done':'')+'">'+(done?'✓':'')+'</div>'+
      '<div class="task-info"><div class="task-name">'+esc(t.name)+'</div><div class="task-sub">'+esc(t.sub)+'</div></div>'+
      (done?'<div class="task-pts">+'+t.pts+'</div>':(t.url?'<a class="task-go" href="'+t.url+'" onclick="openLink(event,\''+t.url+'\')">Go →</a>':'<div class="task-pts pending">+'+t.pts+'</div>'))+
    '</div>';
  });
  html+='</div>';

  html+='<div class="sec"><div class="sec-label">👥 Refer &amp; Earn <span class="hint">+300 each</span></div><div class="ref-box">'+
      '<div class="ref-stat"><div><div class="ref-stat-val">'+refCount+'</div><div class="ref-stat-lbl">Friends invited</div></div>'+
      '<div style="text-align:right"><div class="ref-stat-val" style="color:var(--green)">+'+fmt(refPts)+'</div><div class="ref-stat-lbl">Points earned</div></div></div>'+
      '<div class="ref-link-row"><div class="ref-link" id="refLink">'+esc(refLink)+'</div><button class="ref-copy" onclick="copyRef(\''+esc(refLink)+'\')">Copy</button></div>'+
      '<button class="ref-share" onclick="shareRef(\''+esc(refLink)+'\')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>Share with Friends</button>'+
    '</div></div>';

  html+='<div class="sec"><div class="sec-label">🏆 Leaderboard <span class="hint">Top '+lb.length+'</span></div><div class="lb-box">';
  if(lb.length){
    var medals=['🥇','🥈','🥉'];
    lb.forEach(function(p,i){
      var isMe = String(p.telegram_id)===String(u.telegram_id);
      var medal = i<3?medals[i]:(i+1);
      var mc = i===0?'medal-1':i===1?'medal-2':i===2?'medal-3':'';
      var nm = p.username?'@'+p.username:(p.first_name||'Anonymous');
      var st = p.streak_count?'<span class="lb-streak">🔥'+p.streak_count+'</span>':'';
      html+='<div class="lb-row'+(isMe?' me':'')+'"><div class="lb-rank '+mc+'">'+medal+'</div>'+
        '<div class="lb-name">'+esc(nm)+(isMe?' <span style="color:var(--blue);font-size:10px">(you)</span>':'')+'</div>'+st+
        '<div class="lb-pts">'+fmt(p.points)+'</div></div>';
    });
  }else{ html+='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px">No rankings yet.</div>'; }
  html+='</div></div>';

  html+='<div class="sec" style="margin-top:18px"><a class="sb-cta" href="'+SPORTSBOOK_URL+'?tgid='+u.telegram_id+'" onclick="openLink(event,\''+SPORTSBOOK_URL+'?tgid='+u.telegram_id+'\')">'+
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.9 5.8L19.5 10l-5.6 1.2L12 17l-1.9-5.8L4.5 10l5.6-1.2z"/></svg>Open Sportsbook</a>'+
    '<div class="sb-sub">AI predictions · live odds · earn while you play</div></div>';

  document.getElementById('root').innerHTML = html;
}

function openLink(ev, url){
  if(TG){ ev.preventDefault(); if(url.indexOf('t.me/')>-1) TG.openTelegramLink(url); else TG.openLink(url); }
}
function copyRef(link){
  try{
    if(navigator.clipboard){ navigator.clipboard.writeText(link); }
    else{ var t=document.createElement('textarea');t.value=link;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t); }
    toast('Referral link copied!');
    if(TG&&TG.HapticFeedback) TG.HapticFeedback.notificationOccurred('success');
  }catch(e){ toast('Copy failed — long-press the link'); }
}
function shareRef(link){
  var text = 'Join me on STRATOS AI — earn $STRAT before the presale! 🚀';
  var shareUrl = 'https://t.me/share/url?url='+encodeURIComponent(link)+'&text='+encodeURIComponent(text);
  if(TG){ TG.openTelegramLink(shareUrl); } else{ window.open(shareUrl,'_blank'); }
}

init();
</script>
</body>
</html>
