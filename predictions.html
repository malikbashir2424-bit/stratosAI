<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STRATOS AI | Sportsbook</title>
<meta name="theme-color" content="#000000"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0a0c0f;color:#e8feff;font-family:'Inter',system-ui,-apple-system,sans-serif;overflow-x:hidden;min-height:100vh;}
a{text-decoration:none;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
:root{--blue:#00E5FF;--green:#39FF7A;--orange:#FF9D2E;--red:#ff5c7a;}

/* ── GRID BG ── */
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.25;}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(5,7,10,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,229,255,.12);}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;letter-spacing:.1em;text-shadow:0 0 12px #00E5FF;}
.nav-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#6fa9b2;transition:color .2s;}
.nav-back:hover{color:#fff;}

/* ── LAYOUT ── */
.page{max-width:1200px;margin:0 auto;padding:72px 12px 40px;display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:900px){.page{grid-template-columns:1fr 340px;gap:20px;padding:72px 20px 40px;}}

/* ── LEFT COLUMN ── */
.col-main{}
.col-side{}

/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.1);border-radius:12px;margin-bottom:8px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#39FF7A;box-shadow:0 0 8px #39FF7A;flex-shrink:0;animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sec-title{font-size:12px;font-weight:800;letter-spacing:.1em;color:#00E5FF;text-transform:uppercase;}
.sec-count{font-size:11px;color:#4f7780;margin-left:auto;}

/* ── MATCH LIST (Tipico style) ── */
.matches-list{display:flex;flex-direction:column;gap:2px;}

.match-row{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;transition:border-color .2s;}
.match-row:hover{border-color:rgba(0,229,255,.25);}
.match-row.expanded{border-color:rgba(0,229,255,.35);background:rgba(0,229,255,.04);}

/* Match header */
.match-head{display:flex;align-items:center;padding:10px 14px;gap:10px;cursor:pointer;user-select:none;}
.match-league-badge{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#4f7780;white-space:nowrap;flex-shrink:0;}
.match-teams{flex:1;display:flex;align-items:center;gap:8px;min-width:0;}
.match-team{display:flex;align-items:center;gap:6px;min-width:0;}
.match-team img{width:18px;height:18px;object-fit:contain;flex-shrink:0;}
.match-team-name{font-size:13px;font-weight:700;color:#e8feff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.match-vs{font-size:10px;color:#2a5c68;font-weight:800;flex-shrink:0;padding:0 4px;}
.match-time{font-size:11px;color:#4f7780;flex-shrink:0;white-space:nowrap;}
.match-chevron{color:#2a5c68;flex-shrink:0;transition:transform .25s;}
.match-row.expanded .match-chevron{transform:rotate(180deg);}

/* Odds buttons */
.odds-row{display:flex;gap:6px;padding:0 14px 10px;flex-wrap:wrap;}
.odd-btn{flex:1;min-width:70px;padding:8px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:all .18s;}
.odd-btn:hover{border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.08);}
.odd-btn.selected{border-color:#00E5FF;background:rgba(0,229,255,.15);box-shadow:0 0 12px rgba(0,229,255,.2);}
.odd-label{font-size:10px;color:#6fa9b2;text-transform:uppercase;letter-spacing:.06em;}
.odd-val{font-size:15px;font-weight:900;color:#fff;}
.odd-btn.selected .odd-val{color:#00E5FF;}

/* Match detail panel */
.match-detail{display:none;border-top:1px solid rgba(0,229,255,.1);padding:16px 14px;}
.match-row.expanded .match-detail{display:block;}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;}
.stat-team-name{font-size:11px;font-weight:700;color:#8fc6cf;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.stat-team-name img{width:16px;height:16px;object-fit:contain;}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.stat-label{font-size:11px;color:#4f7780;}
.stat-val{font-size:12px;font-weight:700;color:#e8feff;}
.form-dots{display:flex;gap:3px;margin-top:4px;}
.fd{width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:800;line-height:18px;text-align:center;}
.fd-W{background:rgba(57,255,122,.2);color:#39FF7A;}
.fd-D{background:rgba(0,229,255,.15);color:#00E5FF;}
.fd-L{background:rgba(255,92,122,.15);color:#ff5c7a;}

/* AI Analysis */
.ai-box{background:rgba(0,229,255,.03);border:1px solid rgba(0,229,255,.15);border-radius:12px;padding:14px;margin-bottom:14px;}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-icon{width:28px;height:28px;border-radius:8px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ai-title{font-size:12px;font-weight:800;color:#00E5FF;letter-spacing:.06em;text-transform:uppercase;}
.ai-text{font-size:13px;color:#8fc6cf;line-height:1.7;}
.ai-verdict{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(57,255,122,.08);border:1px solid rgba(57,255,122,.3);color:#39FF7A;}

/* Prob bars */
.prob-section{margin-bottom:14px;}
.prob-row{margin-bottom:8px;}
.prob-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.prob-label{font-size:12px;color:#8fc6cf;font-weight:600;}
.prob-pct{font-size:13px;font-weight:900;}
.prob-bar{height:8px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;}
.prob-fill{height:100%;border-radius:4px;animation:barGrow .7s cubic-bezier(.16,1,.3,1);}
@keyframes barGrow{from{width:0}}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid rgba(0,229,255,.15);border-top-color:#00E5FF;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}

/* ── BETSLIP (right column) ── */
.betslip{background:rgba(255,255,255,.03);border:1px solid rgba(0,229,255,.12);border-radius:14px;padding:16px;position:sticky;top:72px;}
.bs-title{font-size:13px;font-weight:800;color:#fff;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.bs-count{background:#00E5FF;color:#000;border-radius:999px;font-size:10px;font-weight:900;padding:2px 7px;}
.bs-empty{text-align:center;padding:28px 0;color:#4f7780;font-size:13px;}
.bs-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;margin-bottom:8px;position:relative;}
.bs-item-match{font-size:11px;color:#6fa9b2;margin-bottom:4px;}
.bs-item-pick{font-size:13px;font-weight:700;color:#fff;margin-bottom:8px;}
.bs-item-odds{font-size:16px;font-weight:900;color:#00E5FF;}
.bs-remove{position:absolute;top:8px;right:8px;font-size:14px;color:#4f7780;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);}
.bs-remove:hover{color:#ff5c7a;background:rgba(255,92,122,.1);}
.bs-stake{width:100%;margin-top:12px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(0,229,255,.2);color:#fff;font-size:14px;font-weight:700;outline:none;text-align:center;}
.bs-stake:focus{border-color:#00E5FF;box-shadow:0 0 0 3px rgba(0,229,255,.12);}
.bs-summary{margin-top:12px;padding:12px;border-radius:10px;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.1);}
.bs-sum-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;}
.bs-sum-label{color:#6fa9b2;}
.bs-sum-val{color:#fff;font-weight:700;}
.bs-sum-win{color:#39FF7A;font-size:15px;font-weight:900;}
.bs-place{width:100%;margin-top:12px;padding:13px;border-radius:12px;font-weight:800;font-size:15px;background:linear-gradient(135deg,#00E5FF,#00a8c4);color:#000;box-shadow:0 0 20px rgba(0,229,255,.35);}
.bs-place:hover{transform:scale(1.02);}
.bs-disclaimer{font-size:10px;color:#3a5c68;margin-top:10px;text-align:center;line-height:1.5;}

/* Demo badge */
.demo-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;font-size:10px;font-weight:700;background:rgba(255,157,46,.08);border:1px solid rgba(255,157,46,.3);color:#FF9D2E;margin-bottom:12px;}

/* Confirm modal */
.overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);}
.overlay.show{display:flex;}
.modal{background:#0d1117;border:1px solid rgba(0,229,255,.3);border-radius:20px;padding:28px 24px;max-width:380px;width:100%;text-align:center;}
@keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.modal{animation:pop .3s cubic-bezier(.16,1,.3,1);}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;height:60px;margin-bottom:2px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="grid-bg">
  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.05) 1px,transparent 1px);background-size:40px 40px;"></div>
  <div style="position:absolute;top:0;left:20%;width:60%;height:40%;background:radial-gradient(circle,rgba(0,229,255,.08),transparent 70%);filter:blur(60px);"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2" style="filter:drop-shadow(0 0 6px #00E5FF)"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>
      STRATOS<span style="color:#00E5FF">AI</span>
    </a>
    <a href="index.html" class="nav-back">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>
  </div>
</nav>

<!-- PAGE -->
<div class="page">

  <!-- LEFT: MATCHES -->
  <div class="col-main">
    <div class="demo-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.9 5.8L19.5 10l-5.6 1.2L12 17l-1.9-5.8L4.5 10l5.6-1.2z"/></svg>
      DEMO MODE · No real money involved
    </div>

    <div class="sec-head">
      <div class="live-dot"></div>
      <span class="sec-title">Upcoming Matches</span>
      <span class="sec-count" id="matchCount">Loading…</span>
    </div>

    <div class="matches-list" id="matchesList">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton" style="height:50px"></div>
    </div>
  </div>

  <!-- RIGHT: BETSLIP -->
  <div class="col-side">
    <div class="betslip">
      <div class="bs-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 12 2 2 4-4"/></svg>
        Bet Slip
        <span class="bs-count" id="bsCount">0</span>
      </div>
      <div id="betslipContent">
        <div class="bs-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2a5c68" stroke-width="1.5" style="margin:0 auto 10px;display:block"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
          Select odds from a match to add to your bet slip
        </div>
      </div>
    </div>
  </div>

</div>

<!-- CONFIRM MODAL -->
<div class="overlay" id="confirmOverlay">
  <div class="modal">
    <div style="width:60px;height:60px;border-radius:50%;background:rgba(57,255,122,.12);border:2px solid #39FF7A;box-shadow:0 0 24px rgba(57,255,122,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#39FF7A" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h3 style="font-size:1.3rem;font-weight:900;color:#fff;margin-bottom:8px">Bet Placed! 🎉</h3>
    <p style="font-size:14px;color:#8fc6cf;margin-bottom:6px" id="confirmText"></p>
    <p style="font-size:12px;color:#4f7780;margin-bottom:20px">This is a demo — no real $STRAT was used.</p>
    <button onclick="closeConfirm()" style="width:100%;padding:12px;border-radius:12px;font-weight:700;background:linear-gradient(135deg,#00E5FF,#00a8c4);color:#000;font-size:15px">Got it!</button>
  </div>
</div>

<script>
var BLUE="#00E5FF", GREEN="#39FF7A", ORANGE="#FF9D2E";
var betSlip = []; // {id, match, pick, label, odds}
var expandedId = null;
var aiCache = {};

/* ══════════════════════════════════════
   LOAD FIXTURES
══════════════════════════════════════ */
async function loadMatches(){
  try{
    var res = await fetch('/.netlify/functions/fixtures');
    if(!res.ok) throw new Error('HTTP '+res.status);
    var data = await res.json();
    var matches = data.matches || [];
    window._matchMap = {};
    matches.forEach(function(m){ window._matchMap[m.id]=m; });
    document.getElementById('matchCount').textContent = matches.length + ' matches';
    renderMatches(matches);
  }catch(e){
    document.getElementById('matchesList').innerHTML =
      '<div style="padding:20px;text-align:center;color:#ff5c7a;font-size:13px;border-radius:10px;border:1px solid rgba(255,92,122,.2);background:rgba(255,92,122,.05)">Could not load matches: '+e.message+'</div>';
  }
}

/* ══════════════════════════════════════
   RENDER MATCHES
══════════════════════════════════════ */
function renderMatches(matches){
  if(!matches.length){
    document.getElementById('matchesList').innerHTML='<div style="padding:24px;text-align:center;color:#4f7780">No upcoming matches found.</div>';
    return;
  }

  var html = matches.map(function(m){
    var kickoff = new Date(m.kickoff);
    var timeStr = kickoff.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}) + ' · ' +
                  kickoff.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

    // Calculate odds from team stats DB
    var odds = calcOdds(m);

    return '<div class="match-row" id="mr-'+m.id+'">' +

      // ── HEADER ──
      '<div class="match-head" onclick="toggleMatch('+m.id+')">' +
        '<span class="match-league-badge">'+m.league+'</span>' +
        '<div class="match-teams">' +
          '<div class="match-team">' +
            (m.homeLogo?'<img src="'+m.homeLogo+'" onerror="this.style.display=\'none\'">':'') +
            '<span class="match-team-name">'+m.home+'</span>' +
          '</div>' +
          '<span class="match-vs">VS</span>' +
          '<div class="match-team">' +
            (m.awayLogo?'<img src="'+m.awayLogo+'" onerror="this.style.display=\'none\'">':'') +
            '<span class="match-team-name">'+m.away+'</span>' +
          '</div>' +
        '</div>' +
        '<span class="match-time">'+timeStr+'</span>' +
        '<svg class="match-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>' +
      '</div>' +

      // ── ODDS ROW ──
      '<div class="odds-row">' +
        makeOddBtn(m.id, '1', m.home, odds.home) +
        makeOddBtn(m.id, 'X', 'Draw', odds.draw) +
        makeOddBtn(m.id, '2', m.away, odds.away) +
      '</div>' +

      // ── DETAIL PANEL ──
      '<div class="match-detail" id="md-'+m.id+'">'+
        '<div style="text-align:center;padding:20px 0;color:#4f7780;font-size:13px" id="md-loading-'+m.id+'">'+
          '<span class="spinner"></span>Loading stats & AI analysis…'+
        '</div>'+
      '</div>' +

    '</div>';
  }).join('');

  document.getElementById('matchesList').innerHTML = html;
}

function makeOddBtn(id, pick, label, odd){
  return '<button class="odd-btn" id="ob-'+id+'-'+pick+'" onclick="selectOdd(event,'+id+',\''+pick+'\',\''+label+'\','+odd+')">' +
    '<span class="odd-label">'+label+'</span>' +
    '<span class="odd-val">'+odd.toFixed(2)+'</span>' +
  '</button>';
}

/* ══════════════════════════════════════
   CALCULATE ODDS FROM STATS
══════════════════════════════════════ */
var TEAM_DB = {
  9:  {gs:2.80,gc:0.50,form:"WWWWW"}, // Spain
  26: {gs:1.80,gc:0.90,form:"WWDWW"}, // USA
  1533:{gs:1.40,gc:1.00,form:"WDWLW"}, // Cape Verde
  1:  {gs:2.40,gc:0.70,form:"WWWDW"}, // Belgium
  32: {gs:1.60,gc:0.80,form:"WWDWL"}, // Egypt
  23: {gs:1.50,gc:1.10,form:"WDWWL"}, // Saudi Arabia
  7:  {gs:1.90,gc:0.80,form:"WWWLW"}, // Uruguay
  22: {gs:1.70,gc:0.90,form:"WWDWW"}, // Iran
  4673:{gs:1.30,gc:1.20,form:"WDLWW"}, // New Zealand
  2:  {gs:2.60,gc:0.60,form:"WWWWW"}, // France
  13: {gs:1.80,gc:0.90,form:"WWDWL"}, // Senegal
  1567:{gs:1.60,gc:1.00,form:"WDWLW"}, // Iraq
  1090:{gs:2.10,gc:0.80,form:"WWWDW"}, // Norway
  10: {gs:2.50,gc:0.70,form:"WWWWW"}, // Argentina
  6:  {gs:2.20,gc:0.80,form:"WWDWW"}, // Brazil
  17: {gs:2.30,gc:0.90,form:"WWWDW"}, // Germany
  5:  {gs:2.70,gc:0.60,form:"WWWWW"}, // Portugal
  21: {gs:2.00,gc:0.70,form:"WWWDW"}, // England
  18: {gs:2.10,gc:0.80,form:"WWDWW"}, // Netherlands
  24: {gs:1.70,gc:0.60,form:"WWWDW"}, // Morocco
  25: {gs:1.90,gc:0.70,form:"WWWWD"}, // Japan
  768:{gs:1.80,gc:0.90,form:"WDWWL"}, // Mexico
  3:  {gs:1.60,gc:1.00,form:"WDWLW"}, // Canada
};
var DEFAULT_STATS = {gs:1.40,gc:1.20,form:"WDLWL"};

function getStats(id){ return TEAM_DB[id] || DEFAULT_STATS; }

function calcOdds(m){
  var h = getStats(m.homeId);
  var a = getStats(m.awayId);
  var HOME_ADV = 1.12;
  var hxg = ((h.gs + a.gc) / 2) * HOME_ADV;
  var axg = ((a.gs + h.gc) / 2) * 0.96;
  hxg = Math.max(0.2, hxg); axg = Math.max(0.2, axg);

  // Poisson probabilities
  function fact(n){var r=1;for(var i=2;i<=n;i++)r*=i;return r;}
  function pois(k,l){return Math.pow(l,k)*Math.exp(-l)/fact(k);}
  var pH=0,pD=0,pA=0;
  for(var i=0;i<=8;i++){for(var j=0;j<=8;j++){var p=pois(i,hxg)*pois(j,axg);if(i>j)pH+=p;else if(i===j)pD+=p;else pA+=p;}}
  var tot=pH+pD+pA; pH/=tot; pD/=tot; pA/=tot;

  // Convert to odds with margin
  var margin = 1.08;
  return {
    home: parseFloat((margin/pH).toFixed(2)),
    draw: parseFloat((margin/pD).toFixed(2)),
    away: parseFloat((margin/pA).toFixed(2)),
    pHome: pH, pDraw: pD, pAway: pA,
    hxg: hxg, axg: axg
  };
}

/* ══════════════════════════════════════
   TOGGLE MATCH DETAIL
══════════════════════════════════════ */
async function toggleMatch(id){
  var row = document.getElementById('mr-'+id);
  var wasExpanded = row.classList.contains('expanded');

  // collapse all
  document.querySelectorAll('.match-row.expanded').forEach(function(r){r.classList.remove('expanded');});

  if(wasExpanded) return;

  row.classList.add('expanded');
  expandedId = id;

  var m = window._matchMap[id];
  if(!m) return;

  // Already loaded?
  if(aiCache[id]){
    renderDetail(id, m, aiCache[id]);
    return;
  }

  // Fetch AI analysis
  var loadEl = document.getElementById('md-loading-'+id);
  if(loadEl) loadEl.innerHTML = '<span class="spinner"></span>Generating AI analysis…';

  try{
    var analysis = await fetchAIAnalysis(m);
    aiCache[id] = analysis;
    renderDetail(id, m, analysis);
  }catch(e){
    renderDetail(id, m, null);
  }
}

/* ══════════════════════════════════════
   FETCH AI ANALYSIS FROM CLAUDE
══════════════════════════════════════ */
async function fetchAIAnalysis(m){
  var h = getStats(m.homeId);
  var a = getStats(m.awayId);
  var odds = calcOdds(m);

  var prompt = "You are STRATOS AI, a sports prediction engine. Analyze this football match and give a concise prediction.\n\n" +
    "Match: "+m.home+" vs "+m.away+"\n" +
    "League: "+m.league+"\n" +
    m.home+" stats: avg "+h.gs+" goals scored, "+h.gc+" conceded, form: "+h.form+"\n" +
    m.away+" stats: avg "+a.gs+" goals scored, "+a.gc+" conceded, form: "+a.form+"\n" +
    "Expected goals: "+m.home+" "+odds.hxg.toFixed(2)+" xG, "+m.away+" "+odds.axg.toFixed(2)+" xG\n\n" +
    "Respond in this exact JSON format (no markdown, no extra text):\n" +
    '{"verdict":"[team name] Win OR Draw","confidence":"High/Medium/Low","analysis":"2-3 sentences explaining why, mentioning form and stats","tip":"One key insight in 1 sentence"}';

  var res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:300,
      messages:[{role:"user",content:prompt}]
    })
  });

  var data = await res.json();
  var text = data.content.map(function(c){return c.text||"";}).join("");
  // Clean JSON
  text = text.replace(/```json|```/g,"").trim();
  return JSON.parse(text);
}

/* ══════════════════════════════════════
   RENDER MATCH DETAIL
══════════════════════════════════════ */
function renderDetail(id, m, ai){
  var el = document.getElementById('md-'+id);
  if(!el) return;

  var h = getStats(m.homeId);
  var a = getStats(m.awayId);
  var odds = calcOdds(m);

  var pH = (odds.pHome*100).toFixed(1);
  var pD = (odds.pDraw*100).toFixed(1);
  var pA = (odds.pAway*100).toFixed(1);

  function formDots(form){
    return form.split('').map(function(r){return '<span class="fd fd-'+r+'">'+r+'</span>';}).join('');
  }

  function probBar(label, pct, color){
    return '<div class="prob-row">'+
      '<div class="prob-head"><span class="prob-label">'+label+'</span><span class="prob-pct" style="color:'+color+'">'+pct+'%</span></div>'+
      '<div class="prob-bar"><div class="prob-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'+
    '</div>';
  }

  var aiHtml = '';
  if(ai){
    var confColor = ai.confidence==='High'?GREEN:ai.confidence==='Medium'?ORANGE:'#8fc6cf';
    aiHtml = '<div class="ai-box">'+
      '<div class="ai-header">'+
        '<div class="ai-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2"><path d="M12 3l1.9 5.8L19.5 10l-5.6 1.2L12 17l-1.9-5.8L4.5 10l5.6-1.2z"/></svg></div>'+
        '<span class="ai-title">STRATOS AI Analysis</span>'+
        '<span style="margin-left:auto;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;background:rgba('+confColor.replace('#','')+',.1);color:'+confColor+';border:1px solid '+confColor+'40">'+ai.confidence+' Confidence</span>'+
      '</div>'+
      '<p class="ai-text">'+ai.analysis+'</p>'+
      '<div style="margin-top:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);font-size:12px;color:#6fa9b2">'+
        '<strong style="color:#fff">💡 Key Insight:</strong> '+ai.tip+
      '</div>'+
      '<div class="ai-verdict">'+
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'+
        'Prediction: <strong>'+ai.verdict+'</strong>'+
      '</div>'+
    '</div>';
  } else {
    aiHtml = '<div class="ai-box"><p style="font-size:13px;color:#6fa9b2">AI analysis unavailable. Using statistical model only.</p></div>';
  }

  el.innerHTML =
    // Stats
    '<div class="stats-grid">'+
      '<div class="stat-card">'+
        '<div class="stat-team-name">'+
          (m.homeLogo?'<img src="'+m.homeLogo+'" onerror="this.style.display=\'none\'">':'')+
          m.home+
        '</div>'+
        '<div class="stat-row"><span class="stat-label">Avg Goals Scored</span><span class="stat-val" style="color:'+GREEN+'">'+h.gs+'</span></div>'+
        '<div class="stat-row"><span class="stat-label">Avg Goals Conceded</span><span class="stat-val" style="color:'+ORANGE+'">'+h.gc+'</span></div>'+
        '<div class="stat-row"><span class="stat-label">xG</span><span class="stat-val" style="color:'+BLUE+'">'+odds.hxg.toFixed(2)+'</span></div>'+
        '<div style="margin-top:6px"><span class="stat-label">Form</span><div class="form-dots" style="margin-top:4px">'+formDots(h.form)+'</div></div>'+
      '</div>'+
      '<div class="stat-card">'+
        '<div class="stat-team-name">'+
          (m.awayLogo?'<img src="'+m.awayLogo+'" onerror="this.style.display=\'none\'">':'')+
          m.away+
        '</div>'+
        '<div class="stat-row"><span class="stat-label">Avg Goals Scored</span><span class="stat-val" style="color:'+GREEN+'">'+a.gs+'</span></div>'+
        '<div class="stat-row"><span class="stat-label">Avg Goals Conceded</span><span class="stat-val" style="color:'+ORANGE+'">'+a.gc+'</span></div>'+
        '<div class="stat-row"><span class="stat-label">xG</span><span class="stat-val" style="color:'+BLUE+'">'+odds.axg.toFixed(2)+'</span></div>'+
        '<div style="margin-top:6px"><span class="stat-label">Form</span><div class="form-dots" style="margin-top:4px">'+formDots(a.form)+'</div></div>'+
      '</div>'+
    '</div>'+

    // Probabilities
    '<div class="prob-section">'+
      probBar(m.home+' Win', pH, BLUE)+
      probBar('Draw', pD, '#9fdfe8')+
      probBar(m.away+' Win', pA, ORANGE)+
    '</div>'+

    // AI Analysis
    aiHtml;
}

/* ══════════════════════════════════════
   BETSLIP
══════════════════════════════════════ */
function selectOdd(e, id, pick, label, odds){
  e.stopPropagation();
  var m = window._matchMap[id];
  if(!m) return;

  // Check if already in slip
  var existing = betSlip.findIndex(function(b){return b.id===id;});

  if(existing >= 0){
    if(betSlip[existing].pick === pick){
      // Deselect
      betSlip.splice(existing, 1);
      document.getElementById('ob-'+id+'-'+pick).classList.remove('selected');
    } else {
      // Change pick
      var oldPick = betSlip[existing].pick;
      document.getElementById('ob-'+id+'-'+oldPick).classList.remove('selected');
      betSlip[existing] = {id:id, match:m.home+' vs '+m.away, pick:pick, label:label, odds:odds};
      document.getElementById('ob-'+id+'-'+pick).classList.add('selected');
    }
  } else {
    betSlip.push({id:id, match:m.home+' vs '+m.away, pick:pick, label:label, odds:odds});
    document.getElementById('ob-'+id+'-'+pick).classList.add('selected');
  }

  renderBetslip();
}

function removeBet(id){
  var b = betSlip.find(function(x){return x.id===id;});
  if(b){
    var btn = document.getElementById('ob-'+id+'-'+b.pick);
    if(btn) btn.classList.remove('selected');
  }
  betSlip = betSlip.filter(function(x){return x.id!==id;});
  renderBetslip();
}

function renderBetslip(){
  document.getElementById('bsCount').textContent = betSlip.length;

  if(!betSlip.length){
    document.getElementById('betslipContent').innerHTML =
      '<div class="bs-empty">'+
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2a5c68" stroke-width="1.5" style="margin:0 auto 10px;display:block"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>'+
        'Select odds from a match to add to your bet slip'+
      '</div>';
    return;
  }

  var totalOdds = betSlip.reduce(function(acc,b){return acc*b.odds;},1);
  var stake = parseFloat(document.getElementById('bsStakeInput') ? document.getElementById('bsStakeInput').value : 100) || 100;
  var potWin = (stake * totalOdds).toFixed(2);

  var items = betSlip.map(function(b){
    return '<div class="bs-item">'+
      '<button class="bs-remove" onclick="removeBet('+b.id+')">✕</button>'+
      '<div class="bs-item-match">'+b.match+'</div>'+
      '<div class="bs-item-pick">'+b.label+' <span style="font-size:11px;color:#6fa9b2">('+b.pick+')</span></div>'+
      '<div class="bs-item-odds">'+b.odds.toFixed(2)+'</div>'+
    '</div>';
  }).join('');

  document.getElementById('betslipContent').innerHTML =
    items +
    '<input id="bsStakeInput" class="bs-stake" type="number" min="1" placeholder="Stake ($STRAT)" value="100" oninput="updatePotential()">'+
    '<div class="bs-summary">'+
      '<div class="bs-sum-row"><span class="bs-sum-label">Selections</span><span class="bs-sum-val">'+betSlip.length+'</span></div>'+
      '<div class="bs-sum-row"><span class="bs-sum-label">Total Odds</span><span class="bs-sum-val">'+totalOdds.toFixed(2)+'</span></div>'+
      '<div class="bs-sum-row"><span class="bs-sum-label">Stake</span><span class="bs-sum-val" id="bsStakeDisplay">'+stake+' $STRAT</span></div>'+
      '<div class="bs-sum-row" style="border-top:1px solid rgba(255,255,255,.06);padding-top:8px;margin-top:4px"><span class="bs-sum-label">Potential Win</span><span class="bs-sum-win" id="bsPotWin">'+potWin+' $STRAT</span></div>'+
    '</div>'+
    '<button class="bs-place" onclick="placeBet()">Place Demo Bet</button>'+
    '<div class="bs-disclaimer">Demo only · No real $STRAT is used · Educational purposes</div>';
}

function updatePotential(){
  var stake = parseFloat(document.getElementById('bsStakeInput').value) || 0;
  var totalOdds = betSlip.reduce(function(acc,b){return acc*b.odds;},1);
  var potWin = (stake * totalOdds).toFixed(2);
  var el = document.getElementById('bsPotWin');
  var sd = document.getElementById('bsStakeDisplay');
  if(el) el.textContent = potWin + ' $STRAT';
  if(sd) sd.textContent = stake + ' $STRAT';
}

function placeBet(){
  if(!betSlip.length) return;
  var stake = parseFloat(document.getElementById('bsStakeInput').value) || 100;
  var totalOdds = betSlip.reduce(function(acc,b){return acc*b.odds;},1);
  var potWin = (stake * totalOdds).toFixed(2);
  var picks = betSlip.map(function(b){return b.label+' @ '+b.odds.toFixed(2);}).join(', ');
  document.getElementById('confirmText').textContent =
    'Your picks: '+picks+' | Stake: '+stake+' $STRAT | Potential win: '+potWin+' $STRAT';
  document.getElementById('confirmOverlay').classList.add('show');
}

function closeConfirm(){
  document.getElementById('confirmOverlay').classList.remove('show');
  // Clear betslip
  betSlip.forEach(function(b){
    var btn = document.getElementById('ob-'+b.id+'-'+b.pick);
    if(btn) btn.classList.remove('selected');
  });
  betSlip = [];
  renderBetslip();
}

// Init
loadMatches();
</script>
