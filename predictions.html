<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STRATOS AI | Sportsbook</title>
<meta name="theme-color" content="#000000"/>
<style>
/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0a0c0f;color:#e8feff;font-family:'Inter',system-ui,-apple-system,sans-serif;overflow-x:hidden;min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
input{font-family:inherit;}

/* ═══════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════ */
:root{
  --blue:#00E5FF;
  --green:#39FF7A;
  --orange:#FF9D2E;
  --red:#ff5c7a;
  --bg:#0a0c0f;
  --bg2:rgba(255,255,255,.03);
  --border:rgba(255,255,255,.07);
  --border-blue:rgba(0,229,255,.2);
  --text-muted:#6fa9b2;
  --text-dim:#4f7780;
  --radius:10px;
  --radius-lg:14px;
}

/* ═══════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════ */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barGrow{from{width:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

/* ═══════════════════════════════════════
   GRID BACKGROUND
═══════════════════════════════════════ */
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.2;
  background-image:linear-gradient(rgba(0,229,255,.06) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,229,255,.06) 1px,transparent 1px);
  background-size:40px 40px;
}

/* ═══════════════════════════════════════
   NAVBAR
═══════════════════════════════════════ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  background:rgba(5,7,10,.94);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,229,255,.1);
  height:56px;
}
.nav-inner{
  max-width:1200px;margin:0 auto;padding:0 16px;
  height:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800;letter-spacing:.1em;text-shadow:0 0 10px var(--blue);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-back{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--text-muted);transition:color .2s;}
.nav-back:hover{color:#fff;}

/* Coming Soon badge */
.coming-soon-badge{
  display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:999px;font-size:12px;font-weight:700;
  border:1px solid rgba(255,157,46,.35);color:var(--orange);
  background:rgba(255,157,46,.06);
}

/* ═══════════════════════════════════════
   PAGE LAYOUT
═══════════════════════════════════════ */
.page{
  position:relative;z-index:1;
  max-width:1200px;margin:0 auto;
  padding:68px 12px 48px;
  display:grid;grid-template-columns:1fr;gap:16px;
}
@media(min-width:920px){
  .page{grid-template-columns:1fr 320px;gap:20px;padding:68px 20px 48px;align-items:start;}
}

/* ═══════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════ */
.sec-head{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;
  background:rgba(0,229,255,.03);border:1px solid rgba(0,229,255,.1);
  border-radius:var(--radius);margin-bottom:8px;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);box-shadow:0 0 7px var(--green);
  flex-shrink:0;animation:pulse 1.8s ease-in-out infinite;
}
.sec-title{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--blue);text-transform:uppercase;}
.sec-meta{font-size:11px;color:var(--text-dim);margin-left:auto;}

/* ═══════════════════════════════════════
   MATCH LIST
═══════════════════════════════════════ */
.matches-list{display:flex;flex-direction:column;gap:3px;}

.match-row{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:border-color .18s;
}
.match-row:hover{border-color:rgba(0,229,255,.22);}
.match-row.expanded{border-color:rgba(0,229,255,.4);}

.match-head{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;cursor:pointer;user-select:none;
}
.match-league{
  font-size:9px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text-dim);white-space:nowrap;flex-shrink:0;
  max-width:70px;overflow:hidden;text-overflow:ellipsis;
}
.match-teams{flex:1;display:flex;align-items:center;gap:6px;min-width:0;}
.match-team{display:flex;align-items:center;gap:5px;min-width:0;flex:1;}
.match-team img{width:16px;height:16px;object-fit:contain;flex-shrink:0;}
.match-team-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.match-vs{font-size:9px;color:var(--text-dim);font-weight:800;flex-shrink:0;}
.match-time{font-size:11px;color:var(--text-dim);flex-shrink:0;white-space:nowrap;}
.chevron{color:var(--text-dim);flex-shrink:0;transition:transform .22s;}
.match-row.expanded .chevron{transform:rotate(180deg);}

/* Odds */
.odds-row{display:flex;gap:5px;padding:0 12px 10px;}
.odd-btn{
  flex:1;padding:7px 4px;border-radius:8px;
  border:1px solid var(--border);background:rgba(255,255,255,.03);
  display:flex;flex-direction:column;align-items:center;gap:1px;
  cursor:pointer;transition:all .15s;
}
.odd-btn:hover{border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.07);}
.odd-btn.selected{border-color:var(--blue);background:rgba(0,229,255,.14);box-shadow:0 0 10px rgba(0,229,255,.15);}
.odd-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.odd-val{font-size:14px;font-weight:900;color:#e8feff;}
.odd-btn.selected .odd-val{color:var(--blue);}

/* ═══════════════════════════════════════
   MATCH DETAIL PANEL
═══════════════════════════════════════ */
.match-detail{
  display:none;border-top:1px solid rgba(0,229,255,.1);
  padding:14px 12px;animation:fadeUp .3s ease-out;
}
.match-row.expanded .match-detail{display:block;}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius);padding:10px;}
.stat-team{font-size:11px;font-weight:700;color:#8fc6cf;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.stat-team img{width:14px;height:14px;object-fit:contain;}
.stat-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.stat-lbl{font-size:10px;color:var(--text-dim);}
.stat-v{font-size:11px;font-weight:700;}
.form-row{display:flex;gap:2px;margin-top:5px;}
.fd{width:16px;height:16px;border-radius:50%;font-size:8px;font-weight:800;line-height:16px;text-align:center;}
.fd-W{background:rgba(57,255,122,.2);color:var(--green);}
.fd-D{background:rgba(0,229,255,.15);color:var(--blue);}
.fd-L{background:rgba(255,92,122,.15);color:var(--red);}

.prob-block{margin-bottom:12px;}
.prob-row{margin-bottom:6px;}
.prob-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.prob-lbl{font-size:11px;color:#8fc6cf;font-weight:600;}
.prob-pct{font-size:12px;font-weight:900;}
.prob-bar{height:7px;border-radius:4px;background:rgba(255,255,255,.05);overflow:hidden;}
.prob-fill{height:100%;border-radius:4px;animation:barGrow .7s cubic-bezier(.16,1,.3,1);}

.ai-box{background:rgba(0,229,255,.03);border:1px solid rgba(0,229,255,.12);border-radius:var(--radius);padding:12px;margin-bottom:12px;}
.ai-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ai-icon{width:26px;height:26px;border-radius:7px;flex-shrink:0;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);display:flex;align-items:center;justify-content:center;}
.ai-title{font-size:11px;font-weight:800;color:var(--blue);letter-spacing:.08em;text-transform:uppercase;}
.ai-text{font-size:12px;color:#8fc6cf;line-height:1.7;margin-bottom:8px;}
.ai-tip{font-size:11px;color:#6fa9b2;line-height:1.6;padding:7px 10px;border-radius:7px;background:rgba(255,255,255,.03);border:1px solid var(--border);}
.ai-verdict{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(57,255,122,.07);border:1px solid rgba(57,255,122,.3);color:var(--green);}

.spinner{width:18px;height:18px;border:2px solid rgba(0,229,255,.15);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius);height:62px;margin-bottom:3px;}

/* Demo badge */
.demo-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700;background:rgba(255,157,46,.07);border:1px solid rgba(255,157,46,.25);color:var(--orange);margin-bottom:10px;}

/* ═══════════════════════════════════════
   BETSLIP
═══════════════════════════════════════ */
.betslip-wrap{position:sticky;top:68px;}
.betslip{background:rgba(10,12,15,.96);border:1px solid rgba(0,229,255,.12);border-radius:var(--radius-lg);overflow:hidden;}

.bs-tabs{display:flex;border-bottom:1px solid var(--border);}
.bs-tab{flex:1;padding:11px 8px;font-size:12px;font-weight:700;color:var(--text-dim);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.bs-tab.active{color:var(--blue);border-bottom-color:var(--blue);}

.bs-panel{padding:14px;}
.bs-panel.hidden{display:none;}

.bs-empty{text-align:center;padding:24px 0;color:var(--text-dim);font-size:13px;line-height:1.6;}

.bs-item{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:6px;position:relative;}
.bs-item-match{font-size:10px;color:var(--text-dim);margin-bottom:3px;}
.bs-item-pick{font-size:13px;font-weight:700;margin-bottom:6px;}
.bs-item-odds{font-size:15px;font-weight:900;color:var(--blue);}
.bs-remove{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);background:rgba(255,255,255,.04);transition:all .15s;}
.bs-remove:hover{color:var(--red);background:rgba(255,92,122,.1);}

.bs-stake{width:100%;margin-top:10px;padding:9px 12px;border-radius:var(--radius);font-size:14px;font-weight:700;background:rgba(255,255,255,.04);border:1px solid var(--border-blue);color:#fff;outline:none;text-align:center;transition:border-color .2s;}
.bs-stake:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,229,255,.1);}

.bs-summary{margin-top:10px;padding:10px;border-radius:var(--radius);background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.1);}
.bs-sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:12px;}
.bs-sum-lbl{color:var(--text-muted);}
.bs-sum-val{font-weight:700;}
.bs-pot-win{color:var(--green);font-size:15px;font-weight:900;}

.bs-place-btn{width:100%;margin-top:10px;padding:13px;border-radius:12px;font-weight:800;font-size:14px;background:linear-gradient(135deg,#00E5FF,#00a8c4);color:#000;box-shadow:0 0 18px rgba(0,229,255,.3);transition:all .2s;}
.bs-place-btn:hover{transform:scale(1.02);}
.bs-disclaimer{font-size:10px;color:var(--text-dim);text-align:center;margin-top:8px;line-height:1.5;}

/* ═══════════════════════════════════════
   MY BETS
═══════════════════════════════════════ */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.stat-mini{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px;text-align:center;}
.stat-mini-val{font-size:16px;font-weight:900;}
.stat-mini-lbl{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

.bet-history-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:6px;}
.bhi-match{font-size:11px;color:var(--text-dim);margin-bottom:3px;}
.bhi-pick{font-size:13px;font-weight:700;margin-bottom:6px;}
.bhi-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-muted);}
.bhi-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;}
.bhi-won{background:rgba(57,255,122,.1);color:var(--green);border:1px solid rgba(57,255,122,.3);}
.bhi-lost{background:rgba(255,92,122,.1);color:var(--red);border:1px solid rgba(255,92,122,.3);}
.bhi-pending{background:rgba(255,157,46,.08);color:var(--orange);border:1px solid rgba(255,157,46,.25);}

/* ═══════════════════════════════════════
   TOAST NOTIFICATION
═══════════════════════════════════════ */
.toast-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);}
.toast-overlay.show{display:flex;}
.toast-box{background:#0d1117;border:1px solid rgba(0,229,255,.3);border-radius:20px;padding:28px 24px;max-width:360px;width:100%;text-align:center;animation:pop .3s cubic-bezier(.16,1,.3,1);}
.toast-icon{width:58px;height:58px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:rgba(57,255,122,.1);border:2px solid var(--green);box-shadow:0 0 22px rgba(57,255,122,.35);}
.toast-title{font-size:1.2rem;font-weight:900;color:#fff;margin-bottom:6px;}
.toast-body{font-size:13px;color:#8fc6cf;line-height:1.6;margin-bottom:8px;}
.toast-note{font-size:11px;color:var(--text-dim);margin-bottom:18px;}
.toast-close{display:inline-block;padding:11px 28px;border-radius:12px;font-weight:700;font-size:14px;background:linear-gradient(135deg,#00E5FF,#00a8c4);color:#000;cursor:pointer;}
</style>
</head>

/* ═══════════════════════════════════════

var S = {

/* ═══════════════════════════════════════
   LOCAL STORAGE HELPERS
═══════════════════════════════════════ */
var LS_KEY = 'stratos_bets';

function saveBetsToStorage(bets){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(bets)); }catch(e){}
}

function loadBetsFromStorage(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}

function addBetToStorage(bet){
  var bets = loadBetsFromStorage();
  bets.unshift(bet); // newest first
  if(bets.length > 50) bets = bets.slice(0,50); // max 50 bets
  saveBetsToStorage(bets);
}

  24:  {gs:1.70,gc:0.60,form:"WWWDW"}, // Morocco
  25:  {gs:1.90,gc:0.70,form:"WWWWD"}, // Japan
  768: {gs:1.80,gc:0.90,form:"WDWWL"}, // Mexico
  3:   {gs:1.60,gc:1.00,form:"WDWLW"}, // Canada
};
var DEFAULT_STATS = {gs:1.40,gc:1.20,form:"WDLWL"};
function getStats(id){ return TEAM_DB[id] || DEFAULT_STATS; }

/* ═══════════════════════════════════════
   ODDS CALCULATOR (Poisson)
═══════════════════════════════════════ */
function calcOdds(m){
  var h = getStats(m.homeId), a = getStats(m.awayId);
  var hxg = Math.max(0.2, ((h.gs+a.gc)/2)*1.12);
  var axg = Math.max(0.2, ((a.gs+h.gc)/2)*0.96);
  function fact(n){var r=1;for(var i=2;i<=n;i++)r*=i;return r;}
  function pois(k,l){return Math.pow(l,k)*Math.exp(-l)/fact(k);}
  var pH=0,pD=0,pA=0;
  for(var i=0;i<=8;i++) for(var j=0;j<=8;j++){
    var p=pois(i,hxg)*pois(j,axg);
    if(i>j)pH+=p; else if(i===j)pD+=p; else pA+=p;
  }
  var tot=pH+pD+pA; pH/=tot; pD/=tot; pA/=tot;
  var mg=1.08;
  return{home:+(mg/pH).toFixed(2),draw:+(mg/pD).toFixed(2),away:+(mg/pA).toFixed(2),pHome:pH,pDraw:pD,pAway:pA,hxg:hxg,axg:axg};
}

/* ═══════════════════════════════════════
   CHECK RESULT (via Netlify function)
═══════════════════════════════════════ */
async function checkAndSettleBets(){
  var bets = loadBetsFromStorage();
  var unsettled = bets.filter(function(b){ return !b.settled; });
  if(!unsettled.length) return;

  var updated = false;
  for(var i=0;i<unsettled.length;i++){
    var bet = unsettled[i];
    // Only check if kickoff has passed
    if(new Date(bet.kickoff) > new Date()) continue;
    try{
      var res = await fetch('/.netlify/functions/check-results?fixtureId='+bet.fixtureId);
      var data = await res.json();
      if(data.finished && data.result){
        var idx = bets.findIndex(function(b){ return b.betId===bet.betId; });
        if(idx>=0){
          bets[idx].settled = true;
          bets[idx].result = data.result;
          bets[idx].won = (bet.pick === data.result);
          bets[idx].finalScore = data.homeGoals+' - '+data.awayGoals;
          updated = true;
        }
      }
    }catch(e){ /* skip */ }
  }
  if(updated) saveBetsToStorage(bets);
}

/* ═══════════════════════════════════════
   LOAD MATCHES
═══════════════════════════════════════ */
async function loadMatches(){
  try{
    var res = await fetch('/.netlify/functions/fixtures');
    if(!res.ok) throw new Error('HTTP '+res.status);
    var data = await res.json();
    var matches = data.matches || [];
    matches.forEach(function(m){ S.matches[m.id]=m; });
    document.getElementById('matchCount').textContent = matches.length+' matches';
    renderMatches(matches);
    // Check unsettled bets in background
    checkAndSettleBets();
  }catch(e){
    document.getElementById('matchesList').innerHTML =
      '<div style="padding:16px;color:#ff5c7a;font-size:13px;border-radius:10px;border:1px solid rgba(255,92,122,.2);background:rgba(255,92,122,.04)">Could not load matches: '+e.message+'</div>';
  }
}

/* ═══════════════════════════════════════
   RENDER MATCHES
═══════════════════════════════════════ */
function renderMatches(matches){
  if(!matches.length){
    document.getElementById('matchesList').innerHTML='<div style="padding:24px;text-align:center;color:var(--text-dim);font-size:13px">No upcoming matches. Check back soon.</div>';
    return;
  }
  document.getElementById('matchesList').innerHTML = matches.map(function(m){
    var odds = calcOdds(m);
    var kickoff = new Date(m.kickoff);
    var timeStr = kickoff.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})+' · '+kickoff.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    return(
      '<div class="match-row" id="mr-'+m.id+'">'+
        '<div class="match-head" onclick="toggleMatch('+m.id+')">'+
          '<span class="match-league">'+m.league+'</span>'+
          '<div class="match-teams">'+
            '<div class="match-team">'+
              (m.homeLogo?'<img src="'+m.homeLogo+'" onerror="this.style.display=\'none\'">':'')+
              '<span class="match-team-name">'+m.home+'</span>'+
            '</div>'+
            '<span class="match-vs">VS</span>'+
            '<div class="match-team" style="justify-content:flex-end">'+
              '<span class="match-team-name" style="text-align:right">'+m.away+'</span>'+
              (m.awayLogo?'<img src="'+m.awayLogo+'" onerror="this.style.display=\'none\'">':'')+
            '</div>'+
          '</div>'+
          '<span class="match-time">'+timeStr+'</span>'+
          '<svg class="chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>'+
        '</div>'+
        '<div class="odds-row">'+oddBtn(m.id,'1',m.home,odds.home)+oddBtn(m.id,'X','Draw',odds.draw)+oddBtn(m.id,'2',m.away,odds.away)+'</div>'+
        '<div class="match-detail" id="md-'+m.id+'">'+
          '<div style="color:var(--text-dim);font-size:12px;padding:8px 0" id="md-load-'+m.id+'"><span class="spinner"></span>Loading AI analysis…</div>'+
        '</div>'+
      '</div>'
    );
  }).join('');
}

function oddBtn(matchId,pick,label,val){
  return '<button class="odd-btn" id="ob-'+matchId+'-'+pick+'" onclick="selectOdd(event,'+matchId+',\''+pick+'\',\''+label+'\','+val+')">'+
    '<span class="odd-label">'+label+'</span>'+
    '<span class="odd-val">'+val.toFixed(2)+'</span>'+
  '</button>';
}

/* ═══════════════════════════════════════
   TOGGLE MATCH DETAIL
═══════════════════════════════════════ */
async function toggleMatch(id){
  var row = document.getElementById('mr-'+id);
  var isOpen = row.classList.contains('expanded');
  document.querySelectorAll('.match-row.expanded').forEach(function(r){ r.classList.remove('expanded'); });
  if(isOpen) return;
  row.classList.add('expanded');
  var m = S.matches[id];
  if(!m) return;
  if(S.aiCache[id]){ renderDetail(id,m,S.aiCache[id]); return; }
  try{
    var analysis = await fetchAI(m);
    S.aiCache[id] = analysis;
    renderDetail(id,m,analysis);
  }catch(e){ renderDetail(id,m,null); }
}

/* ═══════════════════════════════════════
   CLAUDE AI ANALYSIS
═══════════════════════════════════════ */
async function fetchAI(m){
  var h=getStats(m.homeId), a=getStats(m.awayId), odds=calcOdds(m);
  var prompt=
    "You are STRATOS AI, a professional football prediction engine. Analyze this match concisely.\n\n"+
    "Match: "+m.home+" vs "+m.away+" ("+m.league+")\n"+
    m.home+": avg "+h.gs+" goals scored, "+h.gc+" conceded, form: "+h.form+", xG: "+odds.hxg.toFixed(2)+"\n"+
    m.away+": avg "+a.gs+" goals scored, "+a.gc+" conceded, form: "+a.form+", xG: "+odds.axg.toFixed(2)+"\n\n"+
    'Respond ONLY in this JSON format (no markdown):\n{"verdict":"[Team] Win OR Draw","confidence":"High/Medium/Low","analysis":"2-3 sentences","tip":"One tactical insight"}';
  var res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:300,messages:[{role:"user",content:prompt}]})
  });
  var data=await res.json();
  var text=data.content.map(function(c){return c.text||"";}).join("").trim().replace(/```json|```/g,"").trim();
  return JSON.parse(text);
}

/* ═══════════════════════════════════════
   RENDER MATCH DETAIL
═══════════════════════════════════════ */
function renderDetail(id,m,ai){
  var el=document.getElementById('md-'+id);
  if(!el) return;
  var h=getStats(m.homeId), a=getStats(m.awayId), odds=calcOdds(m);
  var pH=(odds.pHome*100).toFixed(1), pD=(odds.pDraw*100).toFixed(1), pA=(odds.pAway*100).toFixed(1);
  function formDots(f){return f.split('').map(function(r){return '<span class="fd fd-'+r+'">'+r+'</span>';}).join('');}
  function probBar(label,pct,color){
    return '<div class="prob-row"><div class="prob-head"><span class="prob-lbl">'+label+'</span><span class="prob-pct" style="color:'+color+'">'+pct+'%</span></div><div class="prob-bar"><div class="prob-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
  }
  var aiHtml;
  if(ai){
    var cc=ai.confidence==='High'?'#39FF7A':ai.confidence==='Medium'?'#FF9D2E':'#8fc6cf';
    aiHtml='<div class="ai-box"><div class="ai-head"><div class="ai-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2"><path d="M12 3l1.9 5.8L19.5 10l-5.6 1.2L12 17l-1.9-5.8L4.5 10l5.6-1.2z"/></svg></div><span class="ai-title">STRATOS AI</span><span style="margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;color:'+cc+';border:1px solid '+cc+'40;background:'+cc+'12">'+ai.confidence+'</span></div><p class="ai-text">'+ai.analysis+'</p><div class="ai-tip">💡 '+ai.tip+'</div><div class="ai-verdict"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Prediction: <strong>'+ai.verdict+'</strong></div><a href="history.html" style="display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:10px;color:var(--text-dim);text-decoration:none">View all predictions →</a></div>';
    // Save prediction to localStorage for history page
    savePredictionToHistory(m, ai);
  } else {
    aiHtml='<div class="ai-box"><p style="font-size:12px;color:var(--text-muted)">AI analysis unavailable.</p></div>';
  }
  el.innerHTML=
    '<div class="stats-grid">'+
      '<div class="stat-box"><div class="stat-team">'+(m.homeLogo?'<img src="'+m.homeLogo+'" onerror="this.style.display=\'none\'">':'')+m.home+'</div>'+
        '<div class="stat-line"><span class="stat-lbl">Goals scored</span><span class="stat-v" style="color:#39FF7A">'+h.gs+'</span></div>'+
        '<div class="stat-line"><span class="stat-lbl">Goals conceded</span><span class="stat-v" style="color:#FF9D2E">'+h.gc+'</span></div>'+
        '<div class="stat-line"><span class="stat-lbl">xG</span><span class="stat-v" style="color:#00E5FF">'+odds.hxg.toFixed(2)+'</span></div>'+
        '<div style="margin-top:5px"><div style="font-size:9px;color:var(--text-dim);margin-bottom:3px">FORM</div><div class="form-row">'+formDots(h.form)+'</div></div>'+
      '</div>'+
      '<div class="stat-box"><div class="stat-team">'+(m.awayLogo?'<img src="'+m.awayLogo+'" onerror="this.style.display=\'none\'">':'')+m.away+'</div>'+
        '<div class="stat-line"><span class="stat-lbl">Goals scored</span><span class="stat-v" style="color:#39FF7A">'+a.gs+'</span></div>'+
        '<div class="stat-line"><span class="stat-lbl">Goals conceded</span><span class="stat-v" style="color:#FF9D2E">'+a.gc+'</span></div>'+
        '<div class="stat-line"><span class="stat-lbl">xG</span><span class="stat-v" style="color:#00E5FF">'+odds.axg.toFixed(2)+'</span></div>'+
        '<div style="margin-top:5px"><div style="font-size:9px;color:var(--text-dim);margin-bottom:3px">FORM</div><div class="form-row">'+formDots(a.form)+'</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="prob-block">'+probBar(m.home+' Win',pH,'#00E5FF')+probBar('Draw',pD,'#9fdfe8')+probBar(m.away+' Win',pA,'#FF9D2E')+'</div>'+
    aiHtml;
}

/* ═══════════════════════════════════════
   BETSLIP
═══════════════════════════════════════ */
function selectOdd(e,id,pick,label,odds){
  e.stopPropagation();
  var m=S.matches[id]; if(!m) return;
  var idx=S.betSlip.findIndex(function(b){return b.id===id;});
  if(idx>=0){
    var old=S.betSlip[idx];
    var oldBtn=document.getElementById('ob-'+id+'-'+old.pick);
    if(oldBtn) oldBtn.classList.remove('selected');
    if(old.pick===pick){ S.betSlip.splice(idx,1); }
    else{
      S.betSlip[idx]={id:id,match:m.home+' vs '+m.away,pick:pick,label:label,odds:odds,fixtureId:m.id,homeTeam:m.home,awayTeam:m.away,kickoff:m.kickoff};
      document.getElementById('ob-'+id+'-'+pick).classList.add('selected');
    }
  } else {
    S.betSlip.push({id:id,match:m.home+' vs '+m.away,pick:pick,label:label,odds:odds,fixtureId:m.id,homeTeam:m.home,awayTeam:m.away,kickoff:m.kickoff});
    document.getElementById('ob-'+id+'-'+pick).classList.add('selected');
  }
  renderBetSlip();
}

function removeBet(id){
  var b=S.betSlip.find(function(x){return x.id===id;});
  if(b){ var btn=document.getElementById('ob-'+id+'-'+b.pick); if(btn) btn.classList.remove('selected'); }
  S.betSlip=S.betSlip.filter(function(x){return x.id!==id;});
  renderBetSlip();
}

function renderBetSlip(){
  document.getElementById('bsCount').textContent=S.betSlip.length;
  if(!S.betSlip.length){
    document.getElementById('slipContent').innerHTML='<div class="bs-empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2a5c68" stroke-width="1.5" style="margin:0 auto 8px;display:block"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Select odds to add to your slip</div>';
    return;
  }
  var totalOdds=S.betSlip.reduce(function(acc,b){return acc*b.odds;},1);
  var stake=parseFloat(document.getElementById('stakeInput')?document.getElementById('stakeInput').value:100)||100;
  var potWin=(stake*totalOdds).toFixed(2);
  var items=S.betSlip.map(function(b){
    return '<div class="bs-item"><button class="bs-remove" onclick="removeBet('+b.id+')">✕</button><div class="bs-item-match">'+b.match+'</div><div class="bs-item-pick">'+b.label+' <span style="font-size:10px;color:var(--text-dim)">('+b.pick+')</span></div><div class="bs-item-odds">'+b.odds.toFixed(2)+'</div></div>';
  }).join('');
  document.getElementById('slipContent').innerHTML=
    items+
    '<input id="stakeInput" class="bs-stake" type="number" min="1" placeholder="Stake ($STRAT)" value="'+stake+'" oninput="updatePotential()">'+
    '<div class="bs-summary">'+
      '<div class="bs-sum-row"><span class="bs-sum-lbl">Selections</span><span class="bs-sum-val">'+S.betSlip.length+'</span></div>'+
      '<div class="bs-sum-row"><span class="bs-sum-lbl">Total odds</span><span class="bs-sum-val">'+totalOdds.toFixed(2)+'</span></div>'+
      '<div class="bs-sum-row"><span class="bs-sum-lbl">Stake</span><span class="bs-sum-val">'+stake+' $STRAT</span></div>'+
      '<div class="bs-sum-row" style="border-top:1px solid rgba(255,255,255,.06);padding-top:7px;margin-top:4px"><span class="bs-sum-lbl">Potential win</span><span class="bs-pot-win" id="potWinDisplay">'+potWin+' $STRAT</span></div>'+
    '</div>'+
    '<button class="bs-place-btn" onclick="placeBet()">Place Demo Bet</button>'+
    '<div class="bs-disclaimer">Demo only · No real $STRAT · For preview purposes</div>';
}

function updatePotential(){
  var stake=parseFloat(document.getElementById('stakeInput').value)||0;
  var totalOdds=S.betSlip.reduce(function(acc,b){return acc*b.odds;},1);
  var el=document.getElementById('potWinDisplay');
  if(el) el.textContent=(stake*totalOdds).toFixed(2)+' $STRAT';
}

/* ═══════════════════════════════════════
   PLACE BET → SAVE TO LOCALSTORAGE
═══════════════════════════════════════ */
function placeBet(){
  if(!S.betSlip.length) return;
  var stake=parseFloat(document.getElementById('stakeInput').value)||100;
  var totalOdds=S.betSlip.reduce(function(acc,b){return acc*b.odds;},1);
  var potWin=(stake*totalOdds).toFixed(2);
  var picks=S.betSlip.map(function(b){return b.label+' @ '+b.odds.toFixed(2);}).join(' + ');

  // Save each bet to localStorage
  S.betSlip.forEach(function(b){
    addBetToStorage({
      betId: b.fixtureId+'-'+b.pick+'-'+Date.now(),
      fixtureId: b.fixtureId,
      match: b.match,
      pick: b.pick,
      label: b.label,
      odds: b.odds,
      stake: stake,
      potentialWin: parseFloat(potWin),
      kickoff: b.kickoff,
      timestamp: new Date().toISOString(),
      settled: false,
      result: null,
      won: null,
      finalScore: null,
    });
  });

  // Show toast
  document.getElementById('toastBody').innerHTML=
    '<strong style="color:#fff">'+picks+'</strong><br>'+
    'Stake: <strong style="color:#fff">'+stake+' $STRAT</strong> · '+
    'Potential win: <strong style="color:#39FF7A">'+potWin+' $STRAT</strong>';
  document.getElementById('toastOverlay').classList.add('show');

  // Clear slip
  S.betSlip.forEach(function(b){
    var btn=document.getElementById('ob-'+b.id+'-'+b.pick);
    if(btn) btn.classList.remove('selected');
  });
  S.betSlip=[];
  renderBetSlip();

  // Refresh my bets if on that tab
  if(S.activeTab==='bets') renderMyBets();
}

function closeToast(){
  document.getElementById('toastOverlay').classList.remove('show');
}

/* ═══════════════════════════════════════
   MY BETS (from localStorage)
═══════════════════════════════════════ */
function renderMyBets(){
  var bets=loadBetsFromStorage();
  if(!bets.length){
    document.getElementById('betsContent').innerHTML='<div class="bs-empty">No bets yet.<br>Place your first demo bet!</div>';
    return;
  }
  var settled=bets.filter(function(b){return b.settled;});
  var won=settled.filter(function(b){return b.won;});
  var pending=bets.filter(function(b){return !b.settled;});
  var winRate=settled.length?((won.length/settled.length)*100).toFixed(0)+'%':'—';

  var statsHtml=
    '<div class="stats-row">'+
      '<div class="stat-mini"><div class="stat-mini-val" style="color:#00E5FF">'+bets.length+'</div><div class="stat-mini-lbl">Total</div></div>'+
      '<div class="stat-mini"><div class="stat-mini-val" style="color:#39FF7A">'+won.length+'</div><div class="stat-mini-lbl">Won</div></div>'+
      '<div class="stat-mini"><div class="stat-mini-val" style="color:#39FF7A">'+winRate+'</div><div class="stat-mini-lbl">Win Rate</div></div>'+
    '</div>';

  var betsHtml=bets.map(function(b){
    var statusClass=b.settled?(b.won?'bhi-won':'bhi-lost'):'bhi-pending';
    var statusText=b.settled?(b.won?'✅ Won':'❌ Lost'):'⏳ Pending';
    var score=b.finalScore?' · '+b.finalScore:'';
    return '<div class="bet-history-item">'+
      '<div class="bhi-match">'+b.match+'</div>'+
      '<div class="bhi-pick">'+b.label+' ('+b.pick+') @ <span style="color:#00E5FF">'+b.odds.toFixed(2)+'</span></div>'+
      '<div class="bhi-row">'+
        '<span>'+b.stake+' $STRAT → <strong style="color:#39FF7A">'+b.potentialWin+'</strong>'+score+'</span>'+
        '<span class="bhi-status '+statusClass+'">'+statusText+'</span>'+
      '</div>'+
    '</div>';
  }).join('');

  document.getElementById('betsContent').innerHTML=statsHtml+betsHtml;
}

/* ═══════════════════════════════════════
   TAB SWITCHING
═══════════════════════════════════════ */
function switchTab(tab){
  S.activeTab=tab;
  document.getElementById('tab-slip').classList.toggle('active',tab==='slip');
  document.getElementById('tab-bets').classList.toggle('active',tab==='bets');
  document.getElementById('panel-slip').classList.toggle('hidden',tab!=='slip');
  document.getElementById('panel-bets').classList.toggle('hidden',tab!=='bets');
  if(tab==='bets') renderMyBets();
}

/* ═══════════════════════════════════════
   SAVE PREDICTION TO HISTORY
═══════════════════════════════════════ */
function savePredictionToHistory(m, ai){
  try{
    var preds = JSON.parse(localStorage.getItem('stratos_predictions')||'[]');
    var exists = preds.findIndex(function(p){ return p.fixtureId===m.id; });
    if(exists >= 0) return; // already saved
    preds.unshift({
      id: 'pred-'+m.id,
      fixtureId: m.id,
      match: m.home+' vs '+m.away,
      league: m.league,
      homeTeam: m.home,
      awayTeam: m.away,
      homeLogo: m.homeLogo,
      awayLogo: m.awayLogo,
      kickoff: m.kickoff,
      verdict: ai.verdict,
      confidence: ai.confidence,
      analysis: ai.analysis,
      tip: ai.tip,
      result: null,
      settled: false,
      won: null,
      finalScore: null,
      timestamp: new Date().toISOString(),
    });
    localStorage.setItem('stratos_predictions', JSON.stringify(preds.slice(0,200)));
  }catch(e){}
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
loadMatches();
renderMyBets(); // pre-load bets count
